<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SceneCheck</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
padding:30px;
text-align:center;
border-bottom:1px solid #333;
}

header h1{
font-size:40px;
}

header p{
color:#aaa;
margin-top:10px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:15px;
}

.card h2{
margin-bottom:15px;
}

.rating{
margin-bottom:12px;
}

.bar{
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:4px;
}

.fill{
height:100%;
background:#ff4d4d;
}

.tag{
display:inline-block;
background:#333;
padding:5px 10px;
border-radius:999px;
font-size:12px;
margin:5px 5px 0 0;
}
</style>

</head>

<body>

<header>
<h1>🎬 SceneCheck</h1>
<p>映画を見る前にセンシティブな内容を確認</p>
</header>

<div class="container">

<select id="language" class="search" style="margin-bottom:10px;">
  <option value="ja-JP">🇯🇵 日本語</option>
  <option value="en-US">🇺🇸 English</option>
</select>

<input
id="search"
class="search"
placeholder="映画タイトルを検索..."

>

<div class="grid" id="movies"></div>

</div>

<script>

const API_KEY = "11098d35652f534fcb8f75ad72907603";

async function searchMovie(query) {

 const language =
 document.getElementById("language").value;

  const response = await fetch(
  `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=${language}&query=${encodeURIComponent(query)}`
);

  const data = await response.json();

  currentResults = data.results;

  moviesDiv.innerHTML = "";

  data.results.slice(0,20).forEach(movie => {

 moviesDiv.innerHTML += `
  <div class="card" onclick="showMovie('${movie.id}')">

    <img
      src="https://image.tmdb.org/t/p/w500${movie.poster_path}"
      style="width:100%; border-radius:10px; margin-bottom:10px;"
    >

    <h2>${movie.title}</h2>

    <p>⭐ ${movie.vote_average.toFixed(1)} / 10</p>

    <p>
      📅 ${
        movie.release_date
          ? movie.release_date.substring(0,4)
          : "不明"
      }
    </p>

  </div>
`;

  });

}

function showSearchResults() {

  moviesDiv.innerHTML = "";

  currentResults.slice(0,20).forEach(movie => {

    moviesDiv.innerHTML += `
      <div class="card" onclick="showMovie('${movie.id}')">

        <img
          src="https://image.tmdb.org/t/p/w500${movie.poster_path}"
          style="width:100%; border-radius:10px; margin-bottom:10px;"
        >

        <h2>${movie.title}</h2>

        <p>⭐ ${movie.vote_average.toFixed(1)} / 10</p>

        <p>
          📅 ${
            movie.release_date
              ? movie.release_date.substring(0,4)
              : "不明"
          }
        </p>

      </div>
    `;
  });

}
async function showMovie(id){

  const language =
  document.getElementById("language").value;

  const response = await fetch(
    `https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=${language}`
  );

  const movie = await response.json();

  const creditsResponse = await fetch(
  `https://api.themoviedb.org/3/movie/${id}/credits?api_key=${API_KEY}`
);

const credits = await creditsResponse.json();

const cast = credits.cast
  .slice(0,5)
  .map(actor => actor.name)
  .join(" / ");

const videosResponse = await fetch(
  `https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`
);

const videos = await videosResponse.json();

const trailer = videos.results.find(
  video =>
    video.site === "YouTube" &&
    video.type === "Trailer"
);
  
  const genres = movie.genres
  .map(g => g.name)
  .join(" / ");

moviesDiv.innerHTML = `
  <div class="card">

   <button onclick="showSearchResults()"
      style="
        padding:10px 15px;
        border:none;
        border-radius:8px;
        margin-bottom:20px;
        cursor:pointer;
      ">
      ← 検索に戻る
    </button>

    <img
      src="https://image.tmdb.org/t/p/w500${movie.poster_path}"
      style="
        width:300px;
        max-width:100%;
        border-radius:10px;
        margin-bottom:20px;
      "
    >

    <h1>${movie.title}</h1>

    ${trailer ? `
<p>
  <a
    href="https://www.youtube.com/watch?v=${trailer.key}"
    target="_blank"
    style="
      display:inline-block;
      padding:10px 15px;
      background:#e50914;
      color:white;
      text-decoration:none;
      border-radius:8px;
      margin:10px 0;
    "
  >
    ▶ 予告編を見る
  </a>
</p>
` : ""}

    <p>⭐ ${movie.vote_average.toFixed(1)} / 10</p>

    <p>🎭 ${genres}</p>

    <p>⏱️ ${movie.runtime} 分</p>

    <p>📅 ${movie.release_date}</p>

    <p>🌍 ${movie.production_countries.map(c => c.name).join(" / ")}</p>

    <p>🏢 ${movie.production_companies.map(c => c.name).join(" / ")}</p>

    <p>💰 ${
      movie.budget
        ? "$" + movie.budget.toLocaleString()
        : "不明"
    }</p>

    <hr style="margin:20px 0; border-color:#333;">

    <h3>出演者</h3>

    <p>${cast}</p>

    <h3>あらすじ</h3>

    <p style="line-height:1.7;">
      ${movie.overview || "あらすじなし"}
    </p>

  </div>
`;

}

const movies = [

{
title:"Oppenheimer",
sexual:2,
violence:3,
gore:1,
tags:["戦争","流血"]
},

{
title:"Joker",
sexual:0,
violence:5,
gore:3,
tags:["暴力","心理"]
},

{
title:"Interstellar",
sexual:0,
violence:1,
gore:0,
tags:["家族向け","SF"]
},

{
title:"Inception",
sexual:1,
violence:2,
gore:0,
tags:["SF","アクション"]
},

{
title:"Titanic",
sexual:3,
violence:1,
gore:0,
tags:["恋愛","災害"]
}

];

const moviesDiv =
document.getElementById("movies");

let currentResults = [];

function render(list){

moviesDiv.innerHTML="";

list.forEach(movie=>{

moviesDiv.innerHTML += `

<div class="card">

<h2>${movie.title}</h2>

<div class="rating">
性的表現 ${movie.sexual}/5
<div class="bar">
<div class="fill"
style="width:${movie.sexual*20}%">
</div>
</div>
</div>

<div class="rating">
暴力表現 ${movie.violence}/5
<div class="bar">
<div class="fill"
style="width:${movie.violence*20}%">
</div>
</div>
</div>

<div class="rating">
グロ表現 ${movie.gore}/5
<div class="bar">
<div class="fill"
style="width:${movie.gore*20}%">
</div>
</div>
</div>

${movie.tags.map(
tag=>`<span class="tag">${tag}</span>`
).join("")}

</div>

`;

});

}

render(movies);

document
.getElementById("search")
.addEventListener("input",(e)=>{

const query = e.target.value.trim();

if(query.length < 2){
return;
}

searchMovie(query);

});


</script>

</body>
</html>
