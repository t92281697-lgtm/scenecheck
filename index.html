<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SceneCheck</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
padding:30px;
text-align:center;
border-bottom:1px solid #333;
}

header h1{
font-size:40px;
}

header p{
color:#aaa;
margin-top:10px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:15px;
}

.card h2{
margin-bottom:15px;
}

.rating{
margin-bottom:12px;
}

.bar{
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:4px;
}

.fill{
height:100%;
background:#ff4d4d;
}

.tag{
display:inline-block;
background:#333;
padding:5px 10px;
border-radius:999px;
font-size:12px;
margin:5px 5px 0 0;
}
</style>

</head>

<body>

<header>
<h1>🎬 SceneCheck</h1>
<p>映画を見る前にセンシティブな内容を確認</p>
</header>

<div class="container">

<select id="language" class="search" style="margin-bottom:10px;">
  <option value="ja-JP">🇯🇵 日本語</option>
  <option value="en-US">🇺🇸 English</option>
</select>

<input
id="search"
class="search"
placeholder="映画タイトルを検索..."

>

<div class="grid" id="movies"></div>

</div>

<script>

const API_KEY = "11098d35652f534fcb8f75ad72907603";

let currentMovieId = null;

const aiRatings = {

475557: { violence: 5, sexual: 2, gore: 3 }, // Joker

27205: { violence: 4, sexual: 1, gore: 2 }, // Inception

157336: { violence: 4, sexual: 1, gore: 2 }, // Interstellar

155: { violence: 4, sexual: 1, gore: 2 }, // The Dark Knight

680: { violence: 5, sexual: 3, gore: 4 }, // Pulp Fiction

13: { violence: 2, sexual: 2, gore: 1 }, // Forrest Gump

597: { violence: 3, sexual: 1, gore: 1 }, // Titanic

603: { violence: 4, sexual: 1, gore: 2 }, // The Matrix

278: { violence: 2, sexual: 1, gore: 1 }, // Shawshank Redemption

19995: { violence: 3, sexual: 1, gore: 1 }, // Avatar

550: { violence: 5, sexual: 3, gore: 3 }, // Fight Club

238: { violence: 4, sexual: 2, gore: 2 }, // The Godfather

424: { violence: 5, sexual: 1, gore: 4 }, // Schindler's List

857: { violence: 5, sexual: 1, gore: 4 }, // Saving Private Ryan

1891: { violence: 4, sexual: 1, gore: 2 }, // The Empire Strikes Back

11: { violence: 3, sexual: 1, gore: 1 }, // Star Wars

120: { violence: 4, sexual: 1, gore: 2 }, // The Lord of the Rings

121: { violence: 4, sexual: 1, gore: 2 }, // The Two Towers

122: { violence: 4, sexual: 1, gore: 2 }, // The Return of the King

272: { violence: 4, sexual: 2, gore: 2 }, // Batman Begins

49026: { violence: 4, sexual: 1, gore: 2 }, // The Dark Knight Rises

1892: { violence: 5, sexual: 1, gore: 4 }, // Return of the Jedi

807: { violence: 5, sexual: 2, gore: 4 }, // Se7en

694: { violence: 5, sexual: 2, gore: 5 }, // The Shining

578: { violence: 5, sexual: 2, gore: 4 }, // Jaws

85: { violence: 4, sexual: 1, gore: 2 }, // Raiders of the Lost Ark

603692: { violence: 5, sexual: 2, gore: 4 }, // John Wick: Chapter 4

76341: { violence: 5, sexual: 1, gore: 4 }, // Mad Max: Fury Road

24428: { violence: 4, sexual: 1, gore: 2 }, // The Avengers

299534: { violence: 4, sexual: 1, gore: 2 } // Avengers: Endgame


};

async function searchMovie(query) {

 const language =
 document.getElementById("language").value;

  const response = await fetch(
  `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=${language}&query=${encodeURIComponent(query)}`
);

  const data = await response.json();

  currentResults = data.results;

  moviesDiv.innerHTML = "";

  data.results.slice(0,20).forEach(movie => {

 moviesDiv.innerHTML += `
  <div class="card" onclick="showMovie('${movie.id}')">

    <img
      src="https://image.tmdb.org/t/p/w500${movie.poster_path}"
      style="width:100%; border-radius:10px; margin-bottom:10px;"
    >

    <h2>${movie.title}</h2>

    <p style="color:#888;font-size:12px;">
ID: ${movie.id}
</p>

    <p>⭐ ${movie.vote_average.toFixed(1)} / 10</p>

    <p>
      📅 ${
        movie.release_date
          ? movie.release_date.substring(0,4)
          : "不明"
      }
    </p>

  </div>
`;

  });

}

function showSearchResults() {

  moviesDiv.innerHTML = "";

  currentResults.slice(0,20).forEach(movie => {

    moviesDiv.innerHTML += `
      <div class="card" onclick="showMovie('${movie.id}')">

        <img
          src="https://image.tmdb.org/t/p/w500${movie.poster_path}"
          style="width:100%; border-radius:10px; margin-bottom:10px;"
        >

        <h2>${movie.title}</h2>

        <p style="color:#888;font-size:12px;">
ID: ${movie.id}
</p>

        <p>⭐ ${movie.vote_average.toFixed(1)} / 10</p>

        <p>
          📅 ${
            movie.release_date
              ? movie.release_date.substring(0,4)
              : "不明"
          }
        </p>

      </div>
    `;
  });

}
async function showMovie(id){

currentMovieId = id;

  const language =
  document.getElementById("language").value;

  const response = await fetch(
    `https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=${language}`
  );

  const movie = await response.json();

  const aiRating = aiRatings[id] || {
violence: 3,
sexual: 1,
gore: 1
};


  const savedRating = JSON.parse(
  localStorage.getItem("rating_" + id)
);

  const creditsResponse = await fetch(
  `https://api.themoviedb.org/3/movie/${id}/credits?api_key=${API_KEY}`
);

const credits = await creditsResponse.json();

const cast = credits.cast
  .slice(0,5)
  .map(actor => actor.name)
  .join(" / ");

const videosResponse = await fetch(
  `https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`
);

const videos = await videosResponse.json();

const trailer = videos.results.find(
  video =>
    video.site === "YouTube" &&
    video.type === "Trailer"
);
  
  const genres = movie.genres
  .map(g => g.name)
  .join(" / ");

moviesDiv.innerHTML = `
  <div class="card">

   <button onclick="showSearchResults()"
      style="
        padding:10px 15px;
        border:none;
        border-radius:8px;
        margin-bottom:20px;
        cursor:pointer;
      ">
      ← 検索に戻る
    </button>

    <img
      src="https://image.tmdb.org/t/p/w500${movie.poster_path}"
      style="
        width:300px;
        max-width:100%;
        border-radius:10px;
        margin-bottom:20px;
      "
    >

    <h1>${movie.title}</h1>

    <h3>🤖 AI推定評価</h3>

<p>💥 暴力表現: ${aiRating.violence} / 5</p>
<p>❤️ 性的表現: ${aiRating.sexual} / 5</p>
<p>🩸 グロ表現: ${aiRating.gore} / 5</p>

<p style="font-size:12px;color:#999;">
※AIによる参考評価
</p>


    ${trailer ? `
<p>
  <a
    href="https://www.youtube.com/watch?v=${trailer.key}"
    target="_blank"
    style="
      display:inline-block;
      padding:10px 15px;
      background:#e50914;
      color:white;
      text-decoration:none;
      border-radius:8px;
      margin:10px 0;
    "
  >
    ▶ 予告編を見る
  </a>
</p>
` : ""}

    <p>⭐ ${movie.vote_average.toFixed(1)} / 10</p>

    <p>🎭 ${genres}</p>

    <p>⏱️ ${movie.runtime} 分</p>

    <p>📅 ${movie.release_date}</p>

    <p>🌍 ${movie.production_countries.map(c => c.name).join(" / ")}</p>

    <p>🏢 ${movie.production_companies.map(c => c.name).join(" / ")}</p>

    <p>💰 ${
      movie.budget
        ? "$" + movie.budget.toLocaleString()
        : "不明"
    }</p>

    <hr style="margin:20px 0; border-color:#333;">

    <h3>出演者</h3>

    <p>${cast}</p>

    <h3>あらすじ</h3>

    <p style="line-height:1.7;">
      ${movie.overview || "あらすじなし"}
    </p>

<hr style="margin:20px 0; border-color:#333;">

<h3>⚠️ SceneCheck評価</h3>

<p><strong>暴力表現</strong></p>
<select id="violence">
  <option>1 - ほぼなし</option>
  <option>2 - 少しあり</option>
  <option>3 - 普通</option>
  <option>4 - 強い</option>
  <option>5 - 非常に強い</option>
</select>

<br><br>

<p><strong>性的表現</strong></p>
<select id="sexual">
  <option>1 - ほぼなし</option>
  <option>2 - 軽いキスや下ネタ</option>
  <option>3 - ベッドシーン示唆</option>
  <option>4 - 明確な性描写</option>
  <option>5 - 非常に露骨</option>
</select>

<br><br>

<p><strong>グロ表現</strong></p>
<select id="gore">
  <option>1 - なし</option>
  <option>2 - 軽い流血</option>
  <option>3 - 傷や死体が見える</option>
  <option>4 - 内臓・切断描写あり</option>
  <option>5 - 非常に生々しい</option>
</select>

<br><br>

<button onclick="submitRating()">
  評価を送信
</button>

<div id="ratingResult" style="margin-top:20px;">
  ${
    savedRating
      ? `
        <h3>あなたの評価</h3>
        <p>💥 暴力表現: ${savedRating.violence}</p>
        <p>❤️ 性的表現: ${savedRating.sexual}</p>
        <p>🩸 グロ表現: ${savedRating.gore}</p>
      `
      : ""
  }
</div>


  </div>
`;

}

function submitRating() {

const violence =
document.getElementById("violence").selectedIndex + 1;

const sexual =
document.getElementById("sexual").selectedIndex + 1;

const gore =
document.getElementById("gore").selectedIndex + 1;

document.getElementById("ratingResult").innerHTML = `
  <h3>あなたの評価</h3>
  <p>💥 暴力表現: ${violence}</p>
  <p>❤️ 性的表現: ${sexual}</p>
  <p>🩸 グロ表現: ${gore}</p>
`;

localStorage.setItem(
  "rating_" + currentMovieId,
  JSON.stringify({
    violence,
    sexual,
    gore
  })
);

}


const movies = [

{
title:"Oppenheimer",
sexual:2,
violence:3,
gore:1,
tags:["戦争","流血"]
},

{
title:"Joker",
sexual:0,
violence:5,
gore:3,
tags:["暴力","心理"]
},

{
title:"Interstellar",
sexual:0,
violence:1,
gore:0,
tags:["家族向け","SF"]
},

{
title:"Inception",
sexual:1,
violence:2,
gore:0,
tags:["SF","アクション"]
},

{
title:"Titanic",
sexual:3,
violence:1,
gore:0,
tags:["恋愛","災害"]
}

];

const moviesDiv =
document.getElementById("movies");

let currentResults = [];

function render(list){

moviesDiv.innerHTML="";

list.forEach(movie=>{

moviesDiv.innerHTML += `

<div class="card">

<h2>${movie.title}</h2>

<div class="rating">
性的表現 ${movie.sexual}/5
<div class="bar">
<div class="fill"
style="width:${movie.sexual*20}%">
</div>
</div>
</div>

<div class="rating">
暴力表現 ${movie.violence}/5
<div class="bar">
<div class="fill"
style="width:${movie.violence*20}%">
</div>
</div>
</div>

<div class="rating">
グロ表現 ${movie.gore}/5
<div class="bar">
<div class="fill"
style="width:${movie.gore*20}%">
</div>
</div>
</div>

${movie.tags.map(
tag=>`<span class="tag">${tag}</span>`
).join("")}

</div>

`;

});

}

render(movies);

document
.getElementById("search")
.addEventListener("input",(e)=>{

const query = e.target.value.trim();

if(query.length < 2){
return;
}

searchMovie(query);

});


</script>

</body>
</html>
